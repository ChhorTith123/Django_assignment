{% extends 'home.html' %}

{% block content %}
<h2>Category</h2>

<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Category Name</th>
      <th scope="col">Description</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>

    {% for category in categories %}

    <tr>
      <th scope="row">{{ forloop.counter }}</th>
      <td>{{ category.name}}</td>
      <td>{{ category.description}}</td>
      <td>
        <a href="{% url 'admin:settings_category_change' category.id %}" class="btn btn-primary">Edit</a>
      </td>
    </tr>

    {% endfor %}

  </tbody>
</table>

{% endblock%}
