{% extends 'home.html'%}

{% block content %}

<h2>Products List</h2>
<div style="display: flex; padding-left: 30px;">


    {% for pro in products %}  
<div class="card" style="width: 18rem;">
  <img style="width: 280px; height: 280px;" class="card-img-top" src="{{pro.image.url}}" alt="Card image cap">
  <div class="card-body">
    <h5 class="card-title">{{pro.name}}</h5>
    <p class="card-text">{{pro.brand}}</p>
    <p class="card-text">Product code: {{pro.barcode}}</p>
    <p class="card-text">Price: {{pro.price}}$</p>
    <a href="{% url 'admin:settings_product_change' pro.id %}" class="btn btn-primary">Edit</a>
  </div>
</div>
    {% endfor %}

</div>


{% endblock %}
